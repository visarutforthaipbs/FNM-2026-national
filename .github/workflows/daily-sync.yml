name: Daily Factory Data Sync

on:
  schedule:
    # Run daily at 02:00 UTC (09:00 Bangkok time, ICT = UTC+7)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: server/sync/requirements.txt

      - name: Install dependencies
        run: pip install -r server/sync/requirements.txt

      - name: Run sync pipeline
        working-directory: server/sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pipeline.py

      - name: Export markers JSON
        working-directory: server/sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python export_markers.py

      - name: Export dashboard stats JSON
        working-directory: server/sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python export_dashboard.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/markers.json client/public/data/dashboard_stats.json
          if git diff --cached --quiet; then
            echo "No data changes detected, skipping commit."
          else
            git commit -m "chore: daily factory data sync $(date -u +%Y-%m-%d)"
            git push
          fi
